name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bushido_planner_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d bushido_planner_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5433/bushido_planner_test
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5433/bushido_planner_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests alembic

      - name: Run migrations
        run: alembic upgrade head

      - name: Start FastAPI app
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
          sleep 5

      - name: Check app health
        run: |
          curl --fail http://127.0.0.1:8000/health

      - name: Run tests
        run: pytest -v

      - name: Show app logs on failure
        if: failure()
        run: cat uvicorn.log